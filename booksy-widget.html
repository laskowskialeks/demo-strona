<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget rezerwacji Booksy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #faf9f7 0%, #f0ece6 100%);
      color: #2e2e2e;
      text-align: center;
      padding: 40px 24px;
    }

    .widget {
      max-width: 420px;
    }

    .kalendarz-ikona {
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      border-radius: 18px;
      background: #b8873b;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 30px rgba(184, 135, 59, 0.35);
    }

    .kalendarz-ikona svg { width: 36px; height: 36px; }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: 1.6rem;
      margin-bottom: 14px;
    }

    p {
      color: #5c5c5c;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      background: #ffffff;
      border-radius: 50px;
      padding: 12px 26px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #b8873b;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.07);
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="kalendarz-ikona">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <path d="M9 15l2 2 4-4"/>
      </svg>
    </div>
    <h1>Tu pojawi się kalendarz salonu</h1>
    <p>W wersji produkcyjnej w tym miejscu klienci zobaczą widget Booksy z wolnymi terminami i zarezerwują wizytę w kilka sekund — bez dzwonienia.</p>
    <span class="badge">Booksy — rezerwacje online 24/7</span>
  </div>
</body>
</html>
